<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sphere Sign — ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --navy: #0D1B5E;
    --gold: #E8B829;
    --bg: #f0f2f7;
    --white: #fff;
    --text: #1a1a2e;
    --text-light: #6b7280;
    --border: #e2e5ef;
    --success: #059669;
    --success-bg: #ecfdf5;
    --error: #dc2626;
    --error-bg: #fef2f2;
  }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    min-height: 100vh;
  }

  .header {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(13,27,94,0.2);
  }
  .header h1 { color: var(--gold); font-size: 17px; font-weight: 700; }
  .header .badge {
    background: var(--gold); color: var(--navy);
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  }

  .main { max-width: 680px; margin: 28px auto; padding: 0 16px; }

  .status-bar {
    background: var(--white);
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    padding: 12px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--success); }

  .card {
    background: var(--white);
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 15px; font-weight: 700; color: var(--navy);
    margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid var(--gold);
    display: flex; align-items: center; gap: 8px;
  }
  .step-num {
    background: var(--navy); color: var(--gold);
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; flex-shrink: 0;
  }

  .dropzone {
    border: 2px dashed var(--border); border-radius: 10px;
    padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag-over { border-color: var(--gold); background: #fffdf5; }
  .dropzone.has-file { border-color: var(--success); border-style: solid; background: var(--success-bg); padding: 20px; }
  .dropzone .icon { font-size: 36px; margin-bottom: 8px; }
  .dropzone .text { font-size: 15px; color: var(--text-light); }
  .dropzone .text strong { color: var(--gold); }
  .dropzone .hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .file-info { display: flex; align-items: center; gap: 12px; text-align: right; }
  .file-info .file-icon { font-size: 32px; }
  .file-info .file-name { font-weight: 600; font-size: 14px; }
  .file-info .file-size { font-size: 12px; color: var(--text-light); }
  .file-info .file-remove {
    margin-right: auto; background: none; border: none;
    font-size: 20px; cursor: pointer; color: var(--error); padding: 4px 8px; border-radius: 4px;
  }

  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .form-row input, .form-row select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 14px;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--navy); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px 20px; border: none; border-radius: 8px;
    font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: #0a1548; }
  .btn-whatsapp { background: #25D366; color: var(--white); }
  .btn-whatsapp:hover:not(:disabled) { background: #1fb855; }
  .btn-outline { background: var(--white); color: var(--text); border: 1px solid var(--border); }

  .result { display: none; margin-top: 18px; }
  .result.show { display: block; }
  .link-box {
    background: #f8f9fc; border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 12px; word-break: break-all; color: var(--navy);
    font-family: monospace; direction: ltr; text-align: left; margin-bottom: 12px;
  }
  .wa-preview {
    background: #dcf8c6; border-radius: 8px; padding: 14px 16px;
    font-size: 14px; line-height: 1.7; margin-bottom: 12px; white-space: pre-wrap;
  }
  .btn-group { display: flex; gap: 10px; }
  .btn-group .btn { flex: 1; }

  .status-msg {
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    margin-top: 12px; display: none; text-align: center;
  }
  .status-msg.show { display: block; }
  .status-msg.loading { background: #eff6ff; color: #2563eb; }
  .status-msg.success { background: var(--success-bg); color: var(--success); }
  .status-msg.error { background: var(--error-bg); color: var(--error); }

  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .btn-group { flex-direction: column; } }
</style>
</head>
<body>

<div class="header">
  <h1>Sphere Sign</h1>
  <span class="badge">v3</span>
</div>

<div class="main">
  <div class="status-bar">
    <span class="dot green"></span>
    <span>מחובר ✓</span>
  </div>

  <!-- Step 1 -->
  <div class="card">
    <div class="card-title"><span class="step-num">1</span> העלאת מסמך</div>
    <div class="dropzone" id="dropzone">
      <div class="icon">📄</div>
      <div class="text">גרור PDF לכאן או <strong>לחץ לבחירה</strong></div>
      <div class="hint">PDF בלבד, עד 10MB</div>
      <input type="file" accept=".pdf" id="fileInput" onchange="handleFile(this.files[0])">
    </div>
  </div>

  <!-- Step 2 -->
  <div class="card">
    <div class="card-title"><span class="step-num">2</span> פרטים</div>
    <div class="form-grid">
      <div class="form-row">
        <label>שם הלקוח</label>
        <input type="text" id="clientName" placeholder="ישראל ישראלי">
      </div>
      <div class="form-row">
        <label>סוג מסמך</label>
        <select id="docType">
          <option value="סיכום שיחה">סיכום שיחה</option>
          <option value="אישור תנאי חיתום">אישור תנאי חיתום</option>
          <option value="מסמך הלוואה">מסמך הלוואה מקופה</option>
          <option value="חוזה שכר טרחה">חוזה שכר טרחה</option>
          <option value="אחר">אחר</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>שם המסמך (כפי שיוצג ללקוח)</label>
      <input type="text" id="docTitle" placeholder="ייקבע אוטומטית לפי שם הקובץ">
    </div>
  </div>

  <!-- Step 3 -->
  <div class="card">
    <div class="card-title"><span class="step-num">3</span> שליחה</div>
    <button class="btn btn-primary" id="generateBtn" onclick="generate()" disabled>
      🔗 צור קישור חתימה
    </button>
    <div class="status-msg" id="statusMsg"></div>
    <div class="result" id="resultSection">
      <div>
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">קישור חתימה:</label>
        <div class="link-box" id="signLink"></div>
      </div>
      <div style="margin-top:14px;">
        <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">הודעת וואצאפ:</label>
        <div class="wa-preview" id="waPreview"></div>
      </div>
      <div class="btn-group" style="margin-top:12px;">
        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">📱 שלח בוואצאפ</button>
        <button class="btn btn-outline" onclick="copyLink()">📋 העתק קישור</button>
      </div>
    </div>
  </div>
</div>

<!-- Hidden iframe for GAS communication -->
<iframe id="gasFrame" name="gasFrame" style="display:none;"></iframe>

<script>
// ==========================================
// CONFIG
// ==========================================
var WEBHOOK = 'https://script.google.com/macros/s/AKfycbzmlKspish9BoBitWmQjOhm4HZmS38dm-_yFrzazVjIdmYidvxpcU-V48KGwK308Vjlqw/exec';
var BASE_URL = 'https://sagiasayag-sphere.github.io/sphere-sign';

var uploadedFile = null;
var uploadedBase64 = null;
var generatedLink = '';
var pendingCallback = null;

// ==========================================
// IFRAME COMMUNICATION
// ==========================================
// Listen for postMessage from GAS iframe
window.addEventListener('message', function(event) {
  // Accept messages from any origin (GAS uses multiple domains)
  var data;
  try {
    data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
  } catch(e) {
    return; // ignore non-JSON messages
  }
  
  if (pendingCallback) {
    var cb = pendingCallback;
    pendingCallback = null;
    cb(data);
  }
});

function sendToGAS(payload, callback) {
  pendingCallback = callback;
  
  var jsonStr = JSON.stringify(payload);
  
  // Create iframe with auto-submitting form
  // GAS will return HTML with parent.postMessage() back to us
  var iframe = document.getElementById('gasFrame');
  
  var html = '<!DOCTYPE html><html><body>'
    + '<form id="f" method="POST" action="' + WEBHOOK + '">'
    + '<textarea name="payload" style="display:none">' + jsonStr.replace(/</g, '\\u003c').replace(/>/g, '\\u003e') + '</textarea>'
    + '</form>'
    + '<script>document.getElementById("f").submit();<\/script>'
    + '</body></html>';
  
  iframe.srcdoc = html;
  
  // Timeout after 30 seconds
  setTimeout(function() {
    if (pendingCallback) {
      pendingCallback = null;
      callback({ success: false, error: 'Timeout — נסה שוב' });
    }
  }, 30000);
}

// ==========================================
// FILE HANDLING
// ==========================================
var dropzone = document.getElementById('dropzone');

dropzone.addEventListener('dragover', function(e) { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', function() { dropzone.classList.remove('drag-over'); });
dropzone.addEventListener('drop', function(e) { e.preventDefault(); dropzone.classList.remove('drag-over'); if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

function handleFile(file) {
  if (!file) return;
  if (file.type !== 'application/pdf') { showStatus('רק קבצי PDF', 'error'); return; }
  if (file.size > 10*1024*1024) { showStatus('הקובץ גדול מ-10MB', 'error'); return; }

  uploadedFile = file;
  var reader = new FileReader();
  reader.onload = function() {
    uploadedBase64 = reader.result.split(',')[1];
    updateBtn();
  };
  reader.readAsDataURL(file);

  var sizeStr = file.size > 1024*1024 ? (file.size/1024/1024).toFixed(1)+' MB' : Math.round(file.size/1024)+' KB';
  dropzone.classList.add('has-file');
  dropzone.innerHTML = '<div class="file-info">'
    + '<span class="file-icon">📄</span>'
    + '<div><div class="file-name">' + file.name + '</div><div class="file-size">' + sizeStr + '</div></div>'
    + '<button class="file-remove" onclick="removeFile(event)">✕</button></div>';

  if (!document.getElementById('docTitle').value) {
    document.getElementById('docTitle').value = file.name.replace('.pdf','');
  }
}

function removeFile(e) {
  e.stopPropagation();
  uploadedFile = null; uploadedBase64 = null;
  dropzone.classList.remove('has-file');
  dropzone.innerHTML = '<div class="icon">📄</div>'
    + '<div class="text">גרור PDF לכאן או <strong>לחץ לבחירה</strong></div>'
    + '<div class="hint">PDF בלבד, עד 10MB</div>'
    + '<input type="file" accept=".pdf" id="fileInput" onchange="handleFile(this.files[0])">';
  updateBtn();
}

function updateBtn() {
  document.getElementById('generateBtn').disabled = !(uploadedBase64 && document.getElementById('clientName').value.trim());
}
document.getElementById('clientName').addEventListener('input', updateBtn);

// ==========================================
// GENERATE LINK
// ==========================================
function generate() {
  if (!uploadedBase64) return;

  var btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> מעלה מסמך...';
  showStatus('מעלה PDF...', 'loading');

  var clientName = document.getElementById('clientName').value.trim();
  var docType = document.getElementById('docType').value;
  var docTitle = document.getElementById('docTitle').value.trim() || uploadedFile.name.replace('.pdf','');

  sendToGAS({
    action: 'upload',
    pdf: uploadedBase64,
    filename: uploadedFile.name,
    clientName: clientName,
    docType: docType
  }, function(response) {
    btn.innerHTML = '🔗 צור קישור חתימה';
    btn.disabled = false;
    updateBtn();

    if (!response || !response.success) {
      showStatus('❌ שגיאה: ' + (response ? response.error : 'No response'), 'error');
      return;
    }

    var params = new URLSearchParams({
      id: response.fileId,
      title: docTitle,
      name: clientName,
      webhook: WEBHOOK
    });
    generatedLink = BASE_URL + '/index.html?' + params.toString();

    document.getElementById('signLink').textContent = generatedLink;
    var waMsg = 'שלום ' + clientName + ',\nמצורף קישור לחתימה על ' + docTitle + ':\n' + generatedLink + '\n\nספירה ביטוח ופיננסים';
    document.getElementById('waPreview').textContent = waMsg;
    document.getElementById('resultSection').classList.add('show');
    showStatus('✅ הקישור מוכן!', 'success');
  });
}

// ==========================================
// ACTIONS
// ==========================================
function copyLink() {
  navigator.clipboard.writeText(generatedLink);
  showStatus('✅ הקישור הועתק!', 'success');
}

function sendWhatsApp() {
  var name = document.getElementById('clientName').value.trim();
  var title = document.getElementById('docTitle').value.trim() || 'מסמך';
  var msg = 'שלום ' + name + ',\nמצורף קישור לחתימה על ' + title + ':\n' + generatedLink + '\n\nספירה ביטוח ופיננסים';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function showStatus(msg, type) {
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg show ' + type;
  if (type !== 'loading') setTimeout(function() { el.className = 'status-msg'; }, 5000);
}
</script>
</body>
</html>
